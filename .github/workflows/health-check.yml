name: Program card health check

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Check official program sources
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run health check
        run: |
          python3 runtime/health_check.py \
            --output /tmp/health-check-report.json \
            --summary /tmp/health-check-summary.md

      - name: Upload health-check report
        uses: actions/upload-artifact@v4
        with:
          name: program-card-health-check
          path: |
            /tmp/health-check-report.json
            /tmp/health-check-summary.md

      - name: Create or update stale-data issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/health-check-report.json', 'utf8'));
            const actionable = report.checks.filter((item) => item.needs_review);
            const title = '[Health check] Program cards need review';
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stale-data',
              per_page: 100,
            });

            if (actionable.length === 0) {
              for (const issue of existing.filter((item) => item.title === title)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Health check is clear as of ${report.checked_at}. UNREACHABLE sources are not treated as closed programs.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
              core.notice('No actionable program-card findings.');
              return;
            }

            let label;
            try {
              label = await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'stale-data' });
            } catch (error) {
              if (error.status !== 404) throw error;
              label = await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'stale-data',
                color: 'D73A4A',
                description: 'Program-card source needs human review',
              });
            }

            const code = '`';
            const rows = actionable
              .map((item) => `| ${item.program_id} | ${code}${item.state}${code} | ${item.http_status || '—'} | ${item.source || 'missing'} |`)
              .join('\n');
            const body = [
              '## Program card health check',
              '',
              `Checked at: ${code}${report.checked_at}${code}`,
              '',
              'The job found source conditions that require human review. This workflow does not modify knowledge cards.',
              '',
              '| Program | State | HTTP | Source |',
              '|---|---|---:|---|',
              rows,
              '',
              `**Policy:** ${code}UNREACHABLE${code} is a transport failure, not evidence that a program is closed. Review the official source, then update the card and its verification date manually.`,
            ].join('\n');
            const issue = existing.find((item) => item.title === title);
            if (issue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
                labels: ['stale-data'],
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['stale-data'],
              });
            }
