name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Runner, schemas, and public-safety checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Runner regression suite
        run: python3 runtime/runner.py --check-all

      - name: Decision-quality benchmark suite
        run: python3 runtime/run_benchmarks.py

      - name: Compile Python modules
        run: python3 -m py_compile runtime/runner.py runtime/verify_route.py runtime/validate_schemas.py runtime/render_report.py runtime/run_benchmarks.py runtime/health_check.py

      - name: Health-check self-test
        run: python3 runtime/health_check.py --self-test

      - name: Validate YAML, schemas, program cards, route output, issue forms, and privacy
        run: python3 runtime/validate_schemas.py

      - name: Render public Markdown report
        run: |
          python3 runtime/runner.py examples/example-ai-startup/project.yaml --output /tmp/example-report.yaml
          python3 runtime/verify_route.py examples/example-ai-startup/project.yaml --all-ai --evidence-dir examples/example-ai-startup/evidence --output /tmp/example-routes.yaml
          python3 runtime/render_report.py /tmp/example-report.yaml /tmp/example-routes.yaml --output /tmp/opportunity-report.md
          test -s /tmp/opportunity-report.md
