name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Runner, schemas, and public-safety checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Runner regression suite
        run: python3 runtime/runner.py --check-all

      - name: Compile Python modules
        run: python3 -m py_compile runtime/runner.py runtime/verify_route.py runtime/validate_schemas.py

      - name: Validate YAML, schemas, program cards, route output, issue forms, and privacy
        run: python3 runtime/validate_schemas.py
