$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/HlinorAI/funding-intelligence/blob/main/schemas/route-verification.schema.yaml
title: Funding Intelligence route verification report
type: object
additionalProperties: true
required: [verification_version, project, mode, routes]
properties:
  verification_version:
    type: integer
    const: 2
  project:
    type: string
    minLength: 1
  mode:
    type: string
    enum: [source_snapshot, live]
  routes:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/route'
$defs:
  nullableString:
    type: [string, 'null']
  route:
    type: object
    additionalProperties: true
    required: [program, program_id, program_status, endpoint_status, project_fit, project_readiness, actual_endpoint, eligibility, resource_type, required_proof, next_action, stop_condition, verified_at, decision]
    properties:
      program: {type: string, minLength: 1}
      program_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
      program_status:
        type: object
        additionalProperties: true
        required: [value, verified_at, source, source_verified, verified_via]
        properties:
          value:
            type: string
            enum: [OPEN, ROLLING, ACTIVE, CLOSED, UPCOMING, VERIFY, WATCH, HOLD, BD-ONLY, UNKNOWN]
          verified_at: {$ref: '#/$defs/nullableString'}
          source: {$ref: '#/$defs/nullableString'}
          source_verified: {type: boolean}
          verified_via: {$ref: '#/$defs/nullableString'}
      endpoint_status:
        type: object
        additionalProperties: true
        required: [value, transport, transport_error, verified_at]
        properties:
          value:
            type: string
            enum: [AVAILABLE, MISSING, UNREACHABLE, UNKNOWN]
          transport:
            type: string
            enum: [NOT_RUN, PASS, UNREACHABLE]
          transport_error: {$ref: '#/$defs/nullableString'}
          verified_at: {$ref: '#/$defs/nullableString'}
      project_fit:
        type: object
        required: [value, basis, score]
        properties:
          value: {type: string, enum: [STRONG, POSSIBLE, WEAK, NONE]}
          basis: {type: array, items: {type: string}}
          score: {type: number, minimum: 0, maximum: 100}
      project_readiness:
        type: string
        enum: [READY, BUILD_FIRST, INCOMPLETE, UNKNOWN, INELIGIBLE, REAPPLY_AFTER_CHANGE]
      actual_endpoint: {$ref: '#/$defs/nullableString'}
      eligibility:
        type: object
        required: [state, passed, missing, notes]
        properties:
          state: {type: string, enum: [READY, BUILD_FIRST, INCOMPLETE, UNKNOWN, INELIGIBLE]}
          passed: {type: array, items: {type: string}}
          missing: {type: array, items: {type: string}}
          notes: {type: array, items: {type: string}}
      resource_type:
        type: array
        minItems: 1
        items: {type: string, minLength: 1}
      required_proof:
        type: array
        items:
          type: object
          required: [requirement, field, status, value]
          properties:
            requirement: {type: string, minLength: 1}
            field: {type: string, minLength: 1}
            status: {type: string, enum: [PASS, MISSING]}
            value: {}
      next_action:
        type: object
        required: [action]
        properties:
          action: {type: string, minLength: 1}
          deliverable: {type: string}
          horizon_days: {type: integer, minimum: 0}
      stop_condition: {type: string, minLength: 1}
      verified_at: {$ref: '#/$defs/nullableString'}
      decision:
        type: string
        enum: [NOW, VERIFY_FIRST, BUILD_FIRST, DO_NOT_APPLY, NO_ACTIONABLE_ENDPOINT, COMPLETE_ELIGIBILITY_DATA, VERIFY_ACCESS_PATH, BUILD_NVIDIA_USE_CASE, APPLY_AGAIN_AFTER_CHANGE]
