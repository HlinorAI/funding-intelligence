$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/HlinorAI/funding-intelligence/blob/main/schemas/program-card.schema.yaml
title: Funding Intelligence program card
type: object
additionalProperties: true
required: [id, name, ecosystem, mechanism, status, best_fit, bad_fit, required_evidence, score, failure_modes, next_action, stop_condition]
properties:
  id:
    type: string
    pattern: '^[a-z0-9][a-z0-9-]*$'
  name:
    type: string
    minLength: 1
  ecosystem:
    type: string
    minLength: 1
  mechanism:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: [proposal_grant, retro, incentive, accelerator, investment, subsidy, bd]
  resource_type:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum: [startup_program, cloud_credits, technical_support, enterprise_bd, accelerator, venture_investment, founder_network, community]
  status:
    type: object
    additionalProperties: true
    required: [state, last_checked, needs_verification, official_source]
    properties:
      state:
        type: string
        enum: [OPEN, ROLLING, ACTIVE, CLOSED, UPCOMING, VERIFY, WATCH, HOLD, BD-ONLY]
      last_checked:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
      needs_verification:
        type: boolean
      official_source:
        type: string
        pattern: '^https?://[^\s]+$'
      health_check:
        type: object
        additionalProperties: false
        properties:
          known_access_http_statuses:
            type: array
            uniqueItems: true
            items:
              type: integer
              enum: [403, 429]
          note:
            type: string
            minLength: 1
  verification:
    type: object
    additionalProperties: true
    required: [actual_endpoint, endpoint_kind, status_check, source_verified, verified_at, verified_via]
    properties:
      actual_endpoint:
        type: string
        pattern: '^https?://[^\s]+$'
      endpoint_kind: {type: string, minLength: 1}
      status_check: {type: string, minLength: 1}
      source_verified: {type: boolean}
      verified_at:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
      verified_via: {type: string, minLength: 1}
  best_fit:
    type: array
    minItems: 1
    items: {type: string, minLength: 1}
  bad_fit:
    type: array
    minItems: 1
    items: {type: string, minLength: 1}
  required_evidence:
    type: array
    minItems: 1
    items: {type: string, minLength: 1}
  evidence_requirements:
    type: object
    minProperties: 1
    additionalProperties:
      type: array
      minItems: 1
      items: {type: string, minLength: 1}
  score:
    type: object
    additionalProperties: true
    required: [strategic_fit, evidence, mechanism_fit]
    properties:
      strategic_fit: {type: number, minimum: 0}
      technical_fit: {type: number, minimum: 0}
      evidence: {type: number, minimum: 0}
      mechanism_fit: {type: number, minimum: 0}
      access: {type: number, minimum: 0}
  failure_modes:
    type: array
    minItems: 1
    items: {type: string, minLength: 1}
  next_action:
    type: object
    additionalProperties: true
    required: [action, deliverable, horizon_days]
    properties:
      action: {type: string, minLength: 1}
      deliverable: {type: string, minLength: 1}
      horizon_days: {type: integer, minimum: 0}
  stop_condition:
    type: string
    minLength: 1
