  state: ACTIVE
  source_label: "Founder resources, Build Hours and startup community; API credits and enhanced benefits may require VC referral"
  last_checked: 2026-07-23
  needs_verification: true
  official_source: https://openai.com/startups
  health_check:
    known_access_http_statuses: [403]
